name: Génération du digest hebdomadaire

on:
  schedule:
    # Tous les lundis à 8h UTC — modifie selon le jour souhaité
    - cron: "0 8 * * 1"
  workflow_dispatch: # permet de lancer manuellement depuis l'onglet Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Générer le digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-digest.mjs

      - name: Commit et push si changement
        run: |
          git config user.name "Bot de contenu"
          git config user.email "bot@noreply.github.com"
          git add src/content/blog
          git diff --staged --quiet || git commit -m "Nouveau digest hebdomadaire généré automatiquement"
          git push
